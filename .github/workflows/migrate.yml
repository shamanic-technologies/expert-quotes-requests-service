name: Run database migrations

on:
  push:
    branches: [main]
    paths:
      - "drizzle/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          EXPERT_QUOTES_REQUESTS_SERVICE_DATABASE_URL: ${{ secrets.EXPERT_QUOTES_REQUESTS_SERVICE_DATABASE_URL }}
